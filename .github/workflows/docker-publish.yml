name: Docker Build and Push

on:
  push:
    branches: [main, master]
    paths:
      - 'app.py'
      - 'main.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'tts_audiobook/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            dqsq2e2/mimo-tts:${{ steps.sha.outputs.short }}-${{ matrix.arch }}
            dqsq2e2/mimo-tts:latest-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Create and push multi-arch manifests
        run: |
          SHORT="${{ steps.sha.outputs.short }}"
          IMAGE="dqsq2e2/mimo-tts"

          docker buildx imagetools create -t "$IMAGE:$SHORT" \
            "$IMAGE:${SHORT}-amd64" \
            "$IMAGE:${SHORT}-arm64"

          docker buildx imagetools create -t "$IMAGE:latest" \
            "$IMAGE:latest-amd64" \
            "$IMAGE:latest-arm64"
